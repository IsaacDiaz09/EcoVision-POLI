<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6">
      Iniciar sesión
    </h2>

    <form (ngSubmit)="login()" class="space-y-4">

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
      />

      <input
        type="password"
        placeholder="Contraseña"
        [(ngModel)]="password"
        name="password"
        required
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
      />

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition disabled:bg-gray-400"
      >
        {{ loading ? 'Ingresando...' : 'Entrar' }}
      </button>

      <p *ngIf="error" class="text-red-500 text-sm text-center">
        {{ error }}
      </p>

    </form>

    <p class="text-sm text-center mt-4">
      ¿No tienes cuenta?
      <a routerLink="/register" class="text-green-600 font-semibold hover:underline">
        Regístrate
      </a>
    </p>

  </div>
</div>
