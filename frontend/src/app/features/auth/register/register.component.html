<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-6">
      Crear cuenta
    </h2>

    <form (ngSubmit)="register()" class="space-y-4">

      <input
        type="text"
        placeholder="Nombre"
        [(ngModel)]="name"
        name="name"
        required
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
      />

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        required
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
      />

      <input
        type="password"
        placeholder="Contraseña"
        [(ngModel)]="password"
        name="password"
        required
        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
      />

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition disabled:bg-gray-400"
      >
        {{ loading ? 'Creando...' : 'Registrarse' }}
      </button>

      <p *ngIf="error" class="text-red-500 text-sm text-center">
        {{ error }}
      </p>

    </form>

    <p class="text-sm text-center mt-4">
      ¿Ya tienes cuenta?
    
    <button
      type="button"
      (click)="goToLogin()"
      class="mt-4 w-full border border-green-500 text-green-600 py-2 rounded-lg hover:bg-green-50 transition">
      Inicia sesión
    </button>
    </p>
  </div>
</div>
